version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    restart: unless-stopped

  worker-default:
    build: ./backend
    command: celery -A workers.celery_app.app worker --loglevel=info -Q default --concurrency=4
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    restart: unless-stopped

  worker-video:
    build: ./backend
    command: celery -A workers.celery_app.app worker --loglevel=info -Q video --concurrency=2
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    restart: unless-stopped

  flower:
    build: ./backend
    command: celery -A workers.celery_app.app flower --port=5555
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - api
    restart: unless-stopped
